[general]
live_config_reload = true
import = [
    "~/.config/alacritty/themes/themes/gruvbox_dark.toml"
]

[window]
padding = { x = 0, y = 0 }
opacity = 0.9
blur = true

[font]
normal = { family="MesloLGS NF", style="Regular" }
size = 10

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "Beam", blinking = "On" }

[mouse]
hide_when_typing = true

